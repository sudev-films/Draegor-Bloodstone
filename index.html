<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedic Asura | Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&family=Source+Serif+4:wght@800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* 1. RESET & BASE STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --nav-height: 80px;
            --gold: #FFD700;
            --space-img: url('space-bg.jpg'); /* Ensure this file is in your folder */
        }

        body { 
            background-color: #0b0b0b; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 2. NAVBAR */
        .navbar {
            height: var(--nav-height);
            background-color: #050505;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%; 
            border-bottom: 1px solid #333;
            position: fixed; /* Keep it at the top while scrolling */
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .nav-left { display: flex; align-items: center; gap: 20px; }
        .nav-logo { height: 50px; width: auto; }
        .studio-name { font-family: 'Eagle Lake', serif; color: var(--gold); font-size: 1.6rem; }

        .nav-right { display: flex; align-items: center; }
        .social-cluster { display: flex; gap: 15px; margin-right: 30px; }
        .social-icon { width: 30px; transition: 0.2s; }
        .social-link:hover .social-icon { transform: scale(1.3); animation: vibrate 0.1s linear infinite; }

        @keyframes vibrate {
            0% { transform: scale(1.3) translate(0, 0); }
            25% { transform: scale(1.3) translate(1px, -1px); }
            50% { transform: scale(1.3) translate(-1px, 1px); }
            100% { transform: scale(1.3) translate(0, 0); }
        }

        .nav-txt { color: #e0e0e0; text-decoration: none; margin-left: 25px; font-size: 0.85rem; text-transform: uppercase; font-weight: 600; }
        .nav-txt:hover { color: var(--gold); }

        /* 3. CINEMATIC HEADER */
        header {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex; 
            justify-content: flex-end; 
            flex-direction: column;
            align-items: center;
            padding-bottom: 15vh;
            overflow: hidden;
        }

        header video {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            z-index: -2;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }
        
        .tagline { 
            font-family: 'Source Serif 4', serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: #ffffff; 
            max-width: 900px; 
            text-align: center;
            text-shadow: 0px 4px 20px rgba(0, 0, 0, 0.8); 
        }

        /* 4. THE INVERSION SECTION */
        .inversion-wrapper {
            position: relative;
            height: 160vh;
            background-color: transparent;
            transition: background-color 0.6s ease;
        }

        .space-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: var(--space-img) center center / cover no-repeat;
            z-index: -5;
            opacity: 0; /* Hidden until we scroll to the quote */
            transition: opacity 0.8s ease;
        }

        .quote-container {
            position: sticky;
            top: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .quote-text {
            font-family: 'Source Serif 4', serif;
            font-size: 5.5rem;
            font-weight: 900;
            color: white;
            z-index: 10; /* Ensures text is always on top */
            transition: transform 0.3s ease, color 0.5s ease;
        }
            

        /* Active state triggered by JS */
        .active-inversion { background-color: white !important; }
        .active-inversion .quote-text {
            background: var(--space-img) fixed center center / cover no-repeat;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 5. GENERAL SECTIONS */
        .container { padding: 100px 10%; background: white; color: black; position: relative; z-index: 10; }
        .video-section h2 { color: var(--blood-red); margin-bottom: 30px; }
        iframe { width: 100%; max-width: 850px; height: 480px; border: none; }

        footer { padding: 50px; text-align: center; background: #050505; color: #555; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <img src="favicon.png" alt="Logo" class="nav-logo">
            <span class="studio-name">Vedic Asura</span>
        </div>
        <div class="nav-right">
            <div class="social-cluster">
                <a href="https://instagram.com/iamsudevmulloor" target="_blank" class="social-link"><img src="Instagram.png" class="social-icon"></a>
                <a href="https://youtube.com/@sudevmulloorart" target="_blank" class="social-link"><img src="YouTube.png" class="social-icon"></a>
            </div>
            <a href="#" class="nav-txt">Home</a>
            <a href="#projects" class="nav-txt">Projects</a>
            <a href="#about" class="nav-txt">About</a>
        </div>
    </nav>

    <header>
        <video autoplay muted loop playsinline><source src="Draegor_Teaser.mp4" type="video/mp4"></video>
        <div class="overlay"></div>
        <p class="tagline">Bringing Ancient Mythologies to Life with Realtime Filmmaking</p>
    </header>

    <section class="inversion-wrapper" id="quote-section">
        <div class="space-bg" id="parallax-bg"></div>
        <div class="quote-container">
            <h2 class="quote-text">Making Stories That Matter.</h2>
        </div>
    </section>

    <div class="container" id="projects">
        <div class="video-section">
            <h2>Latest Cinematic Update</h2>
            <iframe src="https://www.youtube.com/embed/lyXFACn-nWc"></iframe>
        </div>
        <div class="about" id="about">
            <h2>Our Philosophy</h2>
            <p>Developed in Unreal Engine 5, we bridge the gap between ancient lore and cutting-edge digital fidelity.</p>
        </div>
    </div>

    <footer>&copy; 2026 VEDIC ASURA STUDIOS</footer>

    <script>
       window.addEventListener('scroll', () => {
           const wrapper = document.getElementById('quote-section');
           const text = document.querySelector('.quote-text');
           const bg = document.getElementById('parallax-bg');
           
           const triggerPoint = window.innerHeight * 0.41;
           const sectionRect = wrapper.getBoundingClientRect();
           const textRect = text.getBoundingClientRect();

    // 1. STAR VISIBILITY: Show stars when the SECTION is on screen
           if (sectionRect.top < window.innerHeight && sectionRect.bottom > 0) {
               bg.style.opacity = "1";
           } else {
               bg.style.opacity = "0";
           }

    // 2. THE INVERSION: Trigger when text hits the 1/3rd mark
    if (textRect.top < triggerPoint) {
        wrapper.classList.add('active-inversion');
    } else {
        wrapper.classList.remove('active-inversion');
    }

    // 3. PARALLAX: Standard movement
    let scrollVal = window.scrollY;
    bg.style.transform = `translateY(${scrollVal * 0.1}px)`;
});
    </script>
</body>
</html>
